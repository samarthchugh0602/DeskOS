<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskOS v2</title>

    <link rel="stylesheet" href="main.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="boot-screen">
    <h1>DeskOS</h1>
    <p>Loading desktop...</p>
</div>

<div id="desktop">

    <!-- DESKTOP ICONS -->

    <div class="desktop-icon" data-app="explorer">
        <div class="icon">📁</div>
        <span>Explorer</span>
    </div>

    <div class="desktop-icon" data-app="notes">
        <div class="icon">📝</div>
        <span>Notes</span>
    </div>

    <div class="desktop-icon" data-app="terminal">
        <div class="icon">💻</div>
        <span>Terminal</span>
    </div>

    <div class="desktop-icon" data-app="calculator">
        <div class="icon">🧮</div>
        <span>Calculator</span>
    </div>

    <div class="desktop-icon" data-app="settings">
        <div class="icon">⚙️</div>
        <span>Settings</span>
    </div>

    <!-- EXPLORER -->

    <div class="window" id="explorer-window">

        <div class="window-header">
            <span>File Explorer</span>

            <div class="window-actions">
                <button class="min-btn">—</button>
                <button class="max-btn">□</button>
                <button class="close-btn">✕</button>
            </div>
        </div>

        <div class="window-body explorer-body">

            <div class="explorer-sidebar">

                <div class="folder-item">Desktop</div>
                <div class="folder-item">Projects</div>
                <div class="folder-item">Pictures</div>
                <div class="folder-item">Downloads</div>

            </div>

            <div class="explorer-content">

                <h3>Desktop</h3>

                <div id="file-list"></div>

            </div>

        </div>

    </div>

    <!-- NOTES -->

    <div class="window" id="notes-window">

        <div class="window-header">
            <span>Notes</span>

            <div class="window-actions">
                <button class="min-btn">—</button>
                <button class="max-btn">□</button>
                <button class="close-btn">✕</button>
            </div>
        </div>

        <div class="window-body">

            <textarea
                id="notes-editor"
                placeholder="Write something..."
            ></textarea>

        </div>

    </div>

    <!-- TERMINAL -->

    <div class="window" id="terminal-window">

        <div class="window-header">
            <span>DeskShell</span>

            <div class="window-actions">
                <button class="min-btn">—</button>
                <button class="max-btn">□</button>
                <button class="close-btn">✕</button>
            </div>
        </div>

        <div class="window-body terminal-body">

            <div id="terminal-output">

                <div>DeskShell v2.0</div>
                <div>Type help for commands</div>

            </div>

            <div class="terminal-row">

                <span>$</span>

                <input
                    id="terminal-input"
                    autocomplete="off"
                >

            </div>

        </div>

    </div>

    <!-- CALCULATOR -->

    <div class="window" id="calculator-window">

        <div class="window-header">
            <span>Calculator</span>

            <div class="window-actions">
                <button class="min-btn">—</button>
                <button class="max-btn">□</button>
                <button class="close-btn">✕</button>
            </div>
        </div>

        <div class="window-body">

            <input
                id="calc-screen"
                readonly
            >

            <div class="calc-grid">

                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>/</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>*</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>-</button>

                <button>0</button>
                <button>.</button>
                <button>=</button>
                <button>+</button>

                <button class="clear-btn">C</button>

            </div>

        </div>

    </div>

    <!-- SETTINGS -->

    <div class="window" id="settings-window">

        <div class="window-header">
            <span>Settings</span>

            <div class="window-actions">
                <button class="min-btn">—</button>
                <button class="max-btn">□</button>
                <button class="close-btn">✕</button>
            </div>
        </div>

        <div class="window-body">

            <h3>Wallpaper</h3>

            <div class="wallpaper-grid">

                <button
                    class="wall-btn"
                    data-wall="aurora"
                >
                    Aurora
                </button>

                <button
                    class="wall-btn"
                    data-wall="sunset"
                >
                    Sunset
                </button>

                <button
                    class="wall-btn"
                    data-wall="space"
                >
                    Space
                </button>

            </div>

        </div>

    </div>

</div>

<!-- TASKBAR -->

<div id="taskbar">

    <div id="task-left">

        <button
            class="task-launch"
            data-app="explorer"
        >
            📁
        </button>

        <button
            class="task-launch"
            data-app="notes"
        >
            📝
        </button>

        <button
            class="task-launch"
            data-app="terminal"
        >
            💻
        </button>

        <button
            class="task-launch"
            data-app="calculator"
        >
            🧮
        </button>

        <button
            class="task-launch"
            data-app="settings"
        >
            ⚙️
        </button>

    </div>

    <div id="task-clock">
        00:00
    </div>

</div>

<script src="filesystem.js"></script>
<script src="windows.js"></script>
<script src="terminal.js"></script>
<script src="app.js"></script>

</body>
</html>
